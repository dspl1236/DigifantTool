name: Build DigiTool Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Get version
        id: ver
        shell: python
        run: |
          import os, re
          text = open("digitool/version.py").read()
          ver  = re.search(r'APP_VERSION\s*=\s*["\x27]([^"\x27]+)["\x27]', text).group(1)
          exe  = f"DigiTool-v{ver}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={ver}\n")
              f.write(f"exe_name={exe}\n")

      - name: Build EXE
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name DigiTool-v${{ steps.ver.outputs.version }}
          --hidden-import PyQt5.QtCore
          --hidden-import PyQt5.QtGui
          --hidden-import PyQt5.QtWidgets
          digitool/main.py

      - name: Verify EXE
        run: dir dist\

      - name: Delete existing latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release delete "v${{ steps.ver.outputs.version }}" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${{ steps.ver.outputs.version }}" 2>/dev/null || true

      - name: Create latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "DigiTool v${{ steps.ver.outputs.version }} — Latest Build" \
            --notes "## DigiTool v${{ steps.ver.outputs.version }}

          **Digifant 1 / 2 / 3 ECU ROM Editor**

          Download DigiTool-v${{ steps.ver.outputs.version }}.exe and run — no install needed.

          ### Supported ECUs
          - **Digifant 1 — G60:** Corrado, Golf, Jetta, Passat Syncro, 16v Limited, Triple-Map / SLS
          - **Digifant 1 — G40:** Polo Mk3, Polo Mk2 (early)
          - **Digifant 2:** Golf 2 / Jetta 2 2.0 8v, 1.8 8v (map addresses unconfirmed)
          - **Digifant 3:** ABF 2.0 16v, ABA 2.0 8v, 9A Corrado (immo bypass provisional)

          ### Features
          - ROM variant detection (CRC32 + reset vector fingerprinting)
          - Ignition and fuel 16x16 heatmap editors
          - 30+ correction/calibration tables
          - Code patch flags (Digi-Lag, open loop lambda, ISV disable, SNS lambda)
          - Immobilizer bypass tab (DF3, provisional)
          - Full hex view with labeled regions
          - ROM compare / diff tool
          - Save as 32KB or 64KB mirrored .bin

          ---
          *Work in progress — always back up your original ROM before editing.*" \
            "dist/DigiTool-v${{ steps.ver.outputs.version }}.exe"
